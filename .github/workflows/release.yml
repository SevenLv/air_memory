name: 发布 AIR_Memory

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号（例如 v1.0.0）'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11（编译 cpython-311 字节码）
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 编译 Python 3.11 字节码
        run: |
          python -m compileall -j 0 -q --invalidation-mode unchecked-hash backend/src/
          echo "[验证] Python 3.11 字节码文件数: $(find backend/src -name "*.cpython-311.pyc" | wc -l)"

      - name: 配置 Python 3.12（编译 cpython-312 字节码）
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 编译 Python 3.12 字节码
        run: |
          python -m compileall -j 0 -q --invalidation-mode unchecked-hash backend/src/
          echo "[验证] Python 3.12 字节码文件数: $(find backend/src -name "*.cpython-312.pyc" | wc -l)"

      - name: 配置 Python 3.13（编译 cpython-313 字节码）
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 编译 Python 3.13 字节码
        run: |
          python -m compileall -j 0 -q --invalidation-mode unchecked-hash backend/src/
          echo "[验证] Python 3.13 字节码文件数: $(find backend/src -name "*.cpython-313.pyc" | wc -l)"
          echo "[验证] 全部字节码文件："
          find backend/src -name "*.pyc" | head -30

      - name: 构建发布包
        run: |
          TAG="${{ github.event.inputs.tag }}"
          PKG_NAME="air_memory-${TAG}"
          PKG_DIR="${PKG_NAME}"

          # 创建发布包目录结构
          mkdir -p "${PKG_DIR}/backend"
          mkdir -p "${PKG_DIR}/frontend"

          # 复制根目录文件
          cp README.md start.sh start.bat "${PKG_DIR}/"

          # 复制文档目录
          cp -r doc "${PKG_DIR}/"

          # 复制 backend（排除 tests/、Dockerfile 和 coverage.json 等开发文件）
          # 仅保留 requirements.txt（启动时安装第三方依赖用）
          cp backend/requirements.txt "${PKG_DIR}/backend/"

          # 复制整个 src 目录（含 __pycache__/ 中编译好的 .pyc）
          cp -r backend/src "${PKG_DIR}/backend/"

          # 将所有 .py 源码替换为空桩文件（保留文件以使 Python 导入机制正常工作，
          # 但不含任何业务逻辑；加载时 Python 会直接使用 unchecked-hash .pyc）
          find "${PKG_DIR}/backend/src" -name "*.py" -type f -exec truncate -s 0 {} +

          # 验证：确认 .pyc 存在且 .py 均为空桩（无业务逻辑）
          PYC_COUNT=$(find "${PKG_DIR}/backend/src" -name "*.pyc" | wc -l)
          PY_NONEMPTY=$(find "${PKG_DIR}/backend/src" -name "*.py" -size +0c | wc -l)
          echo "[验证] .pyc 文件数: ${PYC_COUNT}（期望: >0）"
          echo "[验证] 非空 .py 文件数: ${PY_NONEMPTY}（期望: 0）"
          if [ "${PYC_COUNT}" -eq 0 ]; then
            echo "[错误] 未找到 .pyc 文件，编译步骤可能失败！"
            exit 1
          fi
          if [ "${PY_NONEMPTY}" -ne 0 ]; then
            echo "[错误] 存在非空 .py 文件，源码未正确清除！"
            exit 1
          fi

          # 复制预构建的前端静态文件（排除 src/ 等开发文件）
          cp -r frontend/dist "${PKG_DIR}/frontend/"

          # 打包为 zip（内部顶级目录为 air_memory-{tag}/）
          zip -r "${PKG_NAME}.zip" "${PKG_DIR}/"

          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --title "AIR_Memory ${{ github.event.inputs.tag }}" \
            --notes-file doc/release_notes_v1.2.6.md \
            "${PKG_NAME}.zip" \
            doc/deploy_guide.md \
            doc/user_guide.md
